<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Revision Tracker</title>
  <meta name="description" content="Track your DSA practice questions, topics, tricks, and revision progress." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ───── Background Glow ───── -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- ───── Header ───── -->
  <header id="app-header">
    <div class="header-left">
      <span class="logo-icon">⚡</span>
      <h1>DSA Revision Tracker</h1>
    </div>
    <div class="header-right">
      <button id="btn-import" class="btn-icon" title="Import JSON">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Import
      </button>
      <button id="btn-export" class="btn-icon" title="Export JSON">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Export
      </button>
      <input type="file" id="import-file" accept=".json" hidden />
    </div>
  </header>

  <!-- ───── Stats Dashboard ───── -->
  <section id="stats-dashboard">
    <div class="stat-card" id="stat-total">
      <span class="stat-value">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-card" id="stat-solved">
      <span class="stat-value">0</span>
      <span class="stat-label">Solved</span>
    </div>
    <div class="stat-card" id="stat-revision">
      <span class="stat-value">0</span>
      <span class="stat-label">Needs Revision</span>
    </div>
    <div class="stat-card" id="stat-todo">
      <span class="stat-value">0</span>
      <span class="stat-label">To Do</span>
    </div>
    <div class="stat-card stat-card-wide" id="stat-progress">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="stat-label" id="progress-label">0 % complete</span>
    </div>
  </section>

  <!-- ───── Controls Row ───── -->
  <section id="controls">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search questions, tricks..." />
    </div>
    <div class="filter-group">
      <select id="filter-topic"><option value="">All Topics</option></select>
      <select id="filter-difficulty">
        <option value="">All Difficulty</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>
      <select id="filter-importance">
        <option value="">All Importance</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="2">⭐⭐</option>
        <option value="1">⭐</option>
      </select>
      <select id="filter-status">
        <option value="">All Status</option>
        <option value="Todo">To Do</option>
        <option value="Solved">Solved</option>
        <option value="Revision">Needs Revision</option>
      </select>
    </div>
    <button id="btn-add" class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Question
    </button>
  </section>

  <!-- ───── Topic Progress Bars ───── -->
  <section id="topic-progress-section" class="hidden">
    <h2 class="section-title">Topic-wise Progress</h2>
    <div id="topic-progress-grid"></div>
  </section>

  <!-- ───── Questions Table ───── -->
  <section id="table-section">
    <div class="table-wrapper">
      <table id="questions-table">
        <thead>
          <tr>
            <th data-sort="topic">Topic <span class="sort-arrow"></span></th>
            <th data-sort="name">Question <span class="sort-arrow"></span></th>
            <th data-sort="difficulty">Difficulty <span class="sort-arrow"></span></th>
            <th data-sort="importance">Importance <span class="sort-arrow"></span></th>
            <th data-sort="status">Status <span class="sort-arrow"></span></th>
            <th>Trick / Notes</th>
            <th data-sort="lastRevised">Last Revised <span class="sort-arrow"></span></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="empty-state" class="hidden">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
        <p>No questions yet. Click <strong>Add Question</strong> to get started!</p>
      </div>
    </div>
  </section>

  <!-- ───── Modal ───── -->
  <div id="modal-overlay" class="hidden">
    <div id="modal" role="dialog" aria-labelledby="modal-title">
      <h2 id="modal-title">Add Question</h2>
      <form id="question-form" autocomplete="off">
        <input type="hidden" id="form-id" />
        <div class="form-row">
          <div class="form-group">
            <label for="form-topic">Topic *</label>
            <input type="text" id="form-topic" list="topic-suggestions" required placeholder="e.g. Arrays, DP, Graphs" />
            <datalist id="topic-suggestions"></datalist>
          </div>
          <div class="form-group">
            <label for="form-name">Question Name *</label>
            <input type="text" id="form-name" required placeholder="e.g. Two Sum" />
          </div>
        </div>
        <div class="form-group">
          <label for="form-link">Question Link</label>
          <input type="url" id="form-link" placeholder="https://leetcode.com/problems/..." />
        </div>
        <div class="form-row form-row-3">
          <div class="form-group">
            <label for="form-difficulty">Difficulty *</label>
            <select id="form-difficulty" required>
              <option value="">Select</option>
              <option value="Easy">Easy</option>
              <option value="Medium">Medium</option>
              <option value="Hard">Hard</option>
            </select>
          </div>
          <div class="form-group">
            <label for="form-importance">Importance (1-5) *</label>
            <div class="star-rating" id="star-rating">
              <span class="star" data-val="1">★</span>
              <span class="star" data-val="2">★</span>
              <span class="star" data-val="3">★</span>
              <span class="star" data-val="4">★</span>
              <span class="star" data-val="5">★</span>
            </div>
            <input type="hidden" id="form-importance" value="3" />
          </div>
          <div class="form-group">
            <label for="form-status">Status *</label>
            <select id="form-status" required>
              <option value="Todo">To Do</option>
              <option value="Solved">Solved</option>
              <option value="Revision">Needs Revision</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="form-trick">Trick / Key Insight / Notes</label>
          <textarea id="form-trick" rows="3" placeholder="e.g. Use hashmap for O(1) lookup, sliding window pattern..."></textarea>
        </div>
        <div class="form-group">
          <label for="form-tags">Tags (comma-separated)</label>
          <input type="text" id="form-tags" placeholder="e.g. hashmap, two-pointer, greedy" />
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ───── Toast ───── -->
  <div id="toast" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
